  <text x="136" y="820" fill="#334155" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="700">cc-gw 的重点不是再造一个大平台，而是先把你每天都会碰到的 AI 接入、切换和排查收回一个地方。</text>
