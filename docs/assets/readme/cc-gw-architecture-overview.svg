  <text x="94" y="174" fill="#020617" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="58" font-weight="800">接入前 / 接入后</text>
  <text x="94" y="226" fill="#475569" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="28">
